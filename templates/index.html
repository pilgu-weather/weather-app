<!DOCTYPE html>
<html lang="ko" translate="no">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Fit</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                sans-serif;

            background:
                linear-gradient(
                    180deg,
                    #edf2f7,
                    #f8f9fb
                );

            color: #1d1d1f;
        }

        .container {

            max-width: 430px;

            margin: auto;

            padding: 22px;
        }

        .logo {

            font-size: 34px;

            font-weight: 800;

            letter-spacing: -1px;

            margin-bottom: 24px;
        }

        form {

            display: flex;

            gap: 10px;
        }

        input {

            flex: 1;

            padding: 16px;

            border-radius: 20px;

            border:
                1px solid rgba(255,255,255,0.35);

            background:
                rgba(255,255,255,0.45);

            backdrop-filter: blur(18px);

            outline: none;

            font-size: 15px;

            color: #1d1d1f;
        }

        button {

            padding: 16px 18px;

            border-radius: 20px;

            border: none;

            background: rgba(255,255,255,0.45);

            color: #1d1d1f;

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255,255,255,0.4);

            font-weight: 600;

            cursor: pointer;
        }

        .location-btn {

            width: 100%;

            margin-top: 14px;
        }

        .style-buttons {

            display: flex;

            gap: 10px;

            overflow-x: auto;

            margin-top: 20px;

            padding-bottom: 4px;
        }

        .style-btn {

            padding:
                12px 18px;

            border-radius: 18px;

            text-decoration: none;

            color: #1d1d1f;

            background:
                rgba(255,255,255,0.45);

            border:
                1px solid rgba(255,255,255,0.35);

            backdrop-filter: blur(18px);

            font-size: 14px;

            white-space: nowrap;

            transition: 0.2s;
        }

        .style-btn.active {

            background: #1d1d1f;

            color: white;
        }

        .card {

            margin-top: 22px;

            padding: 28px;

            border-radius: 34px;

            background:
                rgba(255,255,255,0.42);

            backdrop-filter: blur(24px);

            border:
                1px solid rgba(255,255,255,0.38);

            box-shadow:
                0 10px 40px rgba(0,0,0,0.04);
        }

        .weather-card {

            text-align: center;
        }

        .city {

            font-size: 26px;

            font-weight: 700;

            margin-bottom: 8px;
        }

        .temp {

            font-size: 78px;

            font-weight: 800;

            letter-spacing: -4px;

            margin-top: 6px;
        }

        .sub {

            font-size: 17px;

            color: #6e6e73;

            margin-top: 8px;
        }

        .style-image {

            width: 100%;

            height: 420px;

            object-fit: cover;

            object-position: center top;

            border-radius: 26px;

            margin-bottom: 18px;
        }

        .style-label {

            font-size: 13px;

            color: #8e8e93;

            letter-spacing: 1px;

            margin-bottom: 10px;
        }

        .style-title {

            font-size: 34px;

            font-weight: 800;

            letter-spacing: -1px;

            margin-bottom: 14px;
        }

        .style-desc {

            font-size: 17px;

            color: #4b4b4f;

            line-height: 1.7;
        }

        .mood {

            margin-top: 18px;

            font-size: 15px;

            color: #8e8e93;

            line-height: 1.6;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="logo">
        Weather Fit
    </div>

    <form method="POST" action="/">

        <input type="text"
               name="city"
               placeholder="Search city">

        <button type="submit">
            Go
        </button>

    </form>

    <button type="button"
            class="location-btn"
            onclick="getLocation()">

        현재 위치로 보기

    </button>

    <div class="style-buttons">

        <a href="/?style=minimal"
           class="style-btn {% if selected_style == 'minimal' %}active{% endif %}">

            미니멀

        </a>

        <a href="/?style=street"
           class="style-btn {% if selected_style == 'street' %}active{% endif %}">

            스트릿

        </a>

        <a href="/?style=boyfriend"
           class="style-btn {% if selected_style == 'boyfriend' %}active{% endif %}">

            남친룩

        </a>

    </div>

    <script>

        function getLocation() {

            navigator.geolocation.getCurrentPosition(

                (pos) => {

                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    window.location.href =
                        `/?lat=${lat}&lon=${lon}`;
                }
            );
        }

    </script>

    {% if temp %}

    <div class="card weather-card">

        <div class="city">
            {{ city_name }}
        </div>

        <img src="{{ icon_url }}"
             style="width:90px;">

        <div class="temp">
            {{ temp }}°
        </div>

        <div class="sub">
            체감 {{ feels_like }}°
        </div>

        <div class="sub">
            최저 {{ temp_min }}°
            /
            최고 {{ temp_max }}°
        </div>

        <div class="sub">
            미세먼지 {{ pm_text }}
        </div>

    </div>

    <div class="card">

        <img src="{{ style_img }}"
             class="style-image">

        <div class="style-label">
            TODAY’S STYLE
        </div>

        <div class="style-title">
            {{ style_name }}
        </div>

        <div class="style-desc">
            {{ style_desc }}
        </div>

        <div class="mood">
            {{ mood_message }}
        </div>

    </div>

    {% endif %}

</div>

</body>

</html>
