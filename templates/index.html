<!DOCTYPE html>
<html lang="ko" translate="no">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Fit</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                sans-serif;

            background:
                linear-gradient(
                    180deg,
                    #edf2f7,
                    #f8f9fb
                );

            color: #1d1d1f;
        }

        .container {

            max-width: 430px;

            margin: auto;

            padding: 22px;
        }

        .logo {

            font-size: 34px;

            font-weight: 800;

            letter-spacing: -1px;

            margin-bottom: 24px;
        }

        form {

            display: flex;

            gap: 10px;
        }

        input {

            flex: 1;

            padding: 16px;

            border-radius: 20px;

            border:
                1px solid rgba(255,255,255,0.35);

            background:
                rgba(255,255,255,0.45);

            backdrop-filter: blur(18px);

            outline: none;

            font-size: 15px;

            color: #1d1d1f;
        }

        button {

            padding: 16px 18px;

            border-radius: 20px;

            border: none;

            background: rgba(255,255,255,0.45);

            color: #1d1d1f;

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255,255,255,0.4);

            font-weight: 600;

            cursor: pointer;
        }

        .location-btn {

            width: 100%;

            margin-top: 14px;
        }

        .card {

            margin-top: 22px;

            padding: 28px;

            border-radius: 34px;

            background:
                rgba(255,255,255,0.42);

            backdrop-filter: blur(24px);

            border:
                1px solid rgba(255,255,255,0.38);

            box-shadow:
                0 10px 40px rgba(0,0,0,0.04);
        }

        .weather-card {

            text-align: center;
        }

        .city {

            font-size: 26px;

            font-weight: 700;

            margin-bottom: 8px;
        }

        .temp {

            font-size: 78px;

            font-weight: 800;

            letter-spacing: -4px;

            margin-top: 6px;
        }

        .sub {

            font-size: 17px;

            color: #6e6e73;

            margin-top: 8px;
        }

        /* =========================
           CAROUSEL
        ========================== */

        .carousel {

            display: flex;

            gap: 20px;

            overflow-x: auto;

            scroll-snap-type: x mandatory;

            scroll-behavior: smooth;

            padding: 10px;

            margin-top: 22px;

            cursor: grab;
        }

        .carousel::-webkit-scrollbar {

            display: none;
        }

        .style-card {

            min-width: 85%;

            scroll-snap-align: center;

            padding: 22px;

            border-radius: 34px;

            background:
                rgba(255,255,255,0.42);

            backdrop-filter: blur(24px);

            border:
                1px solid rgba(255,255,255,0.38);

            box-shadow:
                0 10px 40px rgba(0,0,0,0.04);

            flex-shrink: 0;
        }

        .style-image {

            width: 100%;

            height: 520px;

            object-fit: cover;

            object-position: center top;

            border-radius: 26px;

            margin-bottom: 22px;
        }

        /* =========================
           STYLE INFO
        ========================== */

        .style-info {

            margin-top: 10px;
        }

        .style-title {

            font-size: 30px;

            font-weight: 800;

            margin-bottom: 10px;
        }

        .style-desc {

            font-size: 16px;

            color: #8e8e93;

            line-height: 1.6;

            margin-bottom: 22px;
        }

        .shop-btn {

            display: inline-block;

            width: 100%;

            text-align: center;

            padding: 16px;

            border-radius: 22px;

            background: #1d1d1f;

            color: white;

            text-decoration: none;

            font-size: 16px;

            font-weight: 700;

            transition: 0.3s;
        }

        .shop-btn:hover {

            opacity: 0.88;
        }

        /* =========================
           DOTS
        ========================== */

        .dots {

            display: flex;

            justify-content: center;

            gap: 8px;

            margin-top: 18px;
        }

        .dot {

            width: 10px;

            height: 10px;

            border-radius: 50%;

            background: #c7c7cc;

            transition: all 0.3s ease;
        }

        .dot.active {

            width: 28px;

            border-radius: 20px;

            background: #1d1d1f;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="logo">
        Weather Fit
    </div>

    <form method="POST" action="/">

        <input type="text"
               name="city"
               placeholder="Search city">

        <button type="submit">
            Go
        </button>

    </form>

    <button type="button"
            class="location-btn"
            onclick="getLocation()">

        현재 위치로 보기

    </button>

    <script>

        function getLocation() {

            navigator.geolocation.getCurrentPosition(

                (pos) => {

                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    window.location.href =
                        `/?lat=${lat}&lon=${lon}`;
                }
            );
        }

    </script>

    {% if temp %}

    <!-- WEATHER -->

    <div class="card weather-card">

        <div class="city">
            {{ city_name }}
        </div>

        <img src="{{ icon_url }}"
             style="width:90px;">

        <div class="temp">
            {{ temp }}°
        </div>

        <div class="sub">
            체감 {{ feels_like }}°
        </div>

        <div class="sub">
            최저 {{ temp_min }}°
            /
            최고 {{ temp_max }}°
        </div>

        <div class="sub">
            미세먼지 {{ pm_text }}
        </div>

    </div>

    <!-- SWIPE -->

    <div class="carousel">

        <!-- MINIMAL -->

        <div class="style-card">

            <img src="/static/styles/minimal.png"
                 class="style-image">

            <div class="style-info">

                <div class="style-title">
                    미니멀 룩
                </div>

                <div class="style-desc">
                    심플하고 깔끔한 여름 데일리 스타일.
                </div>

                <a href="https://www.musinsa.com"
                   target="_blank"
                   class="shop-btn">

                   상세 보기

                </a>

            </div>

        </div>

        <!-- BOYFRIEND -->

        <div class="style-card">

            <img src="/static/styles/boyfriend.png"
                 class="style-image">

            <div class="style-info">

                <div class="style-title">
                    남친룩
                </div>

                <div class="style-desc">
                    셔츠와 반바지 기반의
                    깔끔한 데이트 무드 스타일.
                </div>

                <a href="https://www.musinsa.com"
                   target="_blank"
                   class="shop-btn">

                   상세 보기

                </a>

            </div>

        </div>

        <!-- STREET -->

        <div class="style-card">

            <img src="/static/styles/street.png"
                 class="style-image">

            <div class="style-info">

                <div class="style-title">
                    스트릿 무드
                </div>

                <div class="style-desc">
                    오버핏과 레이어드 중심의
                    힙한 여름 스트릿 스타일.
                </div>

                <a href="https://www.musinsa.com"
                   target="_blank"
                   class="shop-btn">

                   상세 보기

                </a>

            </div>

        </div>

    </div>

    <!-- DOTS -->

    <div class="dots">

        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>

    </div>

    {% endif %}

</div>

<!-- ACTIVE DOT SCRIPT -->

<script>

    const carousel =
        document.querySelector(".carousel");

    const dots =
        document.querySelectorAll(".dot");

    carousel.addEventListener("scroll", () => {

        const cardWidth =
            carousel.querySelector(".style-card")
            .offsetWidth + 20;

        const index =
            Math.round(
                carousel.scrollLeft / cardWidth
            );

        dots.forEach((dot) => {
            dot.classList.remove("active");
        });

        if (dots[index]) {
            dots[index].classList.add("active");
        }

    });

</script>

</body>

</html>
