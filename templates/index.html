<!DOCTYPE html>
<html lang="ko" translate="no">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Weather Fit</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                sans-serif;

            background:
                linear-gradient(
                    180deg,
                    #edf2f7,
                    #f8f9fb
                );

            color: #1d1d1f;

            position: relative;

            overflow-x: hidden;
        }

        body::before {

            content: "";

            position: fixed;

            inset: 0;

            background:
                radial-gradient(
                    circle at top left,
                    rgba(255,255,255,0.9),
                    transparent 40%
                );

            z-index: -1;

            pointer-events: none;
        }

        .container {

            max-width: 430px;

            margin: auto;

            padding: 22px;
        }

        .logo {

            font-size: 36px;

            font-weight: 800;

            letter-spacing: -1.5px;

            margin-bottom: 24px;
        }

        form {

            display: flex;

            gap: 10px;
        }

        input {

            flex: 1;

            padding: 16px;

            border-radius: 22px;

            border:
                1px solid rgba(255,255,255,0.45);

            background:
                rgba(255,255,255,0.58);

            backdrop-filter: blur(18px);

            outline: none;

            font-size: 15px;

            color: #1d1d1f;

            box-shadow:
                inset 0 1px 1px rgba(255,255,255,0.8);
        }

        button {

            padding: 16px 18px;

            border-radius: 22px;

            border: none;

            background:
                rgba(255,255,255,0.58);

            color: #1d1d1f;

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255,255,255,0.4);

            font-weight: 700;

            cursor: pointer;

            box-shadow:
                0 8px 20px rgba(0,0,0,0.06);
        }

        .location-btn {

            width: 100%;

            margin-top: 14px;
        }

        .card {

            margin-top: 22px;

            padding: 28px;

            border-radius: 36px;

            background:
                rgba(255,255,255,0.58);

            backdrop-filter: blur(24px);

            border:
                1px solid rgba(255,255,255,0.45);

            box-shadow:
                0 18px 50px rgba(0,0,0,0.10),
                inset 0 1px 1px rgba(255,255,255,0.85);
        }

        .weather-card {

            text-align: center;
        }

        .city {

            font-size: 28px;

            font-weight: 800;

            margin-bottom: 8px;
        }

        .temp {

            font-size: 82px;

            font-weight: 800;

            letter-spacing: -5px;

            margin-top: 6px;
        }

        .sub {

            font-size: 17px;

            color: #6e6e73;

            margin-top: 8px;
        }

        /* =========================
           CAROUSEL
        ========================== */

        .carousel {

            display: flex;

            gap: 22px;

            overflow-x: auto;

            scroll-snap-type: x mandatory;

            scroll-behavior: smooth;

            padding: 10px;

            margin-top: 24px;

            cursor: grab;
        }

        .carousel::-webkit-scrollbar {

            display: none;
        }

        .style-card {

            min-width: 85%;

            scroll-snap-align: center;

            padding: 22px;

            border-radius: 36px;

            background:
                rgba(255,255,255,0.58);

            backdrop-filter: blur(24px);

            border:
                1px solid rgba(255,255,255,0.45);

            box-shadow:
                0 18px 50px rgba(0,0,0,0.12),
                inset 0 1px 1px rgba(255,255,255,0.85);

            flex-shrink: 0;

            transition:
                transform 0.35s ease,
                box-shadow 0.35s ease;
        }

        .style-card:hover {

            transform:
                translateY(-8px)
                scale(1.01);

            box-shadow:
                0 28px 60px rgba(0,0,0,0.16),
                inset 0 1px 1px rgba(255,255,255,0.9);
        }

        .style-image {

            width: 100%;

            height: 520px;

            object-fit: cover;

            object-position: center top;

            border-radius: 28px;

            margin-bottom: 22px;

            transition:
                transform 0.5s ease;
        }

        .style-card:hover .style-image {

            transform: scale(1.03);
        }

        .style-info {

            margin-top: 10px;
        }

        .style-title {

            font-size: 31px;

            font-weight: 800;

            margin-bottom: 10px;

            letter-spacing: -1px;
        }

        .style-desc {

            font-size: 16px;

            color: #8e8e93;

            line-height: 1.7;

            margin-bottom: 24px;
        }

        .shop-btn {

            display: inline-block;

            width: 100%;

            text-align: center;

            padding: 17px;

            border-radius: 24px;

            background:
                linear-gradient(
                    180deg,
                    #2c2c2e,
                    #111111
                );

            color: white;

            text-decoration: none;

            font-size: 16px;

            font-weight: 700;

            transition: 0.3s;

            box-shadow:
                0 10px 24px rgba(0,0,0,0.20);
        }

        .shop-btn:hover {

            transform: translateY(-3px);

            opacity: 0.94;
        }

        .dots {

            display: flex;

            justify-content: center;

            gap: 8px;

            margin-top: 18px;
        }

        .dot {

            width: 10px;

            height: 10px;

            border-radius: 50%;

            background: #c7c7cc;

            transition: all 0.3s ease;
        }

        .dot.active {

            width: 30px;

            border-radius: 20px;

            background: #1d1d1f;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="logo">
        Weather Fit
    </div>

    <form method="POST" action="/">

        <input type="text"
               name="city"
               placeholder="Search city">

        <button type="submit">
            Go
        </button>

    </form>

    <button type="button"
            class="location-btn"
            onclick="getLocation()">

        현재 위치로 보기

    </button>

    <script>

        function getLocation() {

            navigator.geolocation.getCurrentPosition(

                (pos) => {

                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    window.location.href =
                        `/?lat=${lat}&lon=${lon}`;
                }
            );
        }

    </script>

    {% if temp %}

    <div class="card weather-card">

        <div class="city">
            {{ city_name }}
        </div>

        <img src="{{ icon_url }}"
             style="width:90px;">

        <div class="temp">
            {{ temp }}°
        </div>

        <div class="sub">
            체감 {{ feels_like }}°
        </div>

        <div class="sub">
            최저 {{ temp_min }}°
            /
            최고 {{ temp_max }}°
        </div>

        <div class="sub">
            미세먼지 {{ pm_text }}
        </div>

    </div>

    <!-- SWIPE -->

    <div class="carousel">

        {% for outfit in outfits %}

        <div class="style-card">

            <img src="{{ outfit.img }}"
                 class="style-image">

            <div class="style-info">

                <div class="style-title">
                    {{ outfit.title }}
                </div>

                <div class="style-desc">
                    {{ outfit.desc }}
                </div>

                <a href="https://www.musinsa.com"
                   target="_blank"
                   class="shop-btn">

                   상세 보기

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

    <!-- DOTS -->

    <div class="dots">

        {% for outfit in outfits %}

        <span class="dot {% if loop.first %}active{% endif %}"></span>

        {% endfor %}

    </div>

    {% endif %}

</div>

<script>

    const carousel =
        document.querySelector(".carousel");

    const dots =
        document.querySelectorAll(".dot");

    if (carousel) {

        carousel.addEventListener("scroll", () => {

            const cardWidth =
                carousel.querySelector(".style-card")
                .offsetWidth + 22;

            const index =
                Math.round(
                    carousel.scrollLeft / cardWidth
                );

            dots.forEach((dot) => {
                dot.classList.remove("active");
            });

            if (dots[index]) {
                dots[index].classList.add("active");
            }

        });

    }

</script>

</body>

</html>
